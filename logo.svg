<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#3a7bd5"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#f7c948"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="40" fill="url(#bg)"/>

  <!-- Anvil shape -->
  <path d="M120 320 L120 260 L160 260 L160 200 L240 200 L240 260 L280 260 L280 320 Z"
        fill="url(#accent)" opacity="0.15"/>

  <!-- Hammer -->
  <rect x="185" y="120" width="30" height="100" rx="4" fill="url(#accent)" opacity="0.3"/>
  <rect x="170" y="100" width="60" height="30" rx="6" fill="url(#accent)"/>

  <!-- Code brackets -->
  <text x="90" y="180" font-family="monospace" font-size="60" fill="url(#accent)" opacity="0.6">&lt;</text>
  <text x="265" y="180" font-family="monospace" font-size="60" fill="url(#accent)" opacity="0.6">&gt;</text>

  <!-- Flame icon -->
  <path d="M200 280 C200 280 185 260 185 245 C185 230 195 220 200 220 C205 220 215 230 215 245 C215 260 200 280 200 280Z"
        fill="url(#flame)" opacity="0.9"/>
  <path d="M200 270 C200 270 192 258 192 248 C192 240 198 234 200 234 C202 234 208 240 208 248 C208 258 200 270 200 270Z"
        fill="#fff" opacity="0.4"/>

  <!-- Text: CodeCraft CLI -->
  <text x="200" y="345" font-family="sans-serif" font-size="24" font-weight="bold"
        fill="#e0e0e0" text-anchor="middle" letter-spacing="4">CODECRAFT</text>
  <text x="200" y="368" font-family="sans-serif" font-size="14" font-weight="bold"
        fill="url(#accent)" text-anchor="middle" letter-spacing="6">CLI</text>

  <!-- Tagline -->
  <text x="200" y="385" font-family="sans-serif" font-size="10" fill="#888"
        text-anchor="middle" letter-spacing="2">YOUR CODE SKILL FORGE</text>

  <!-- Small decorative dots -->
  <circle cx="80" cy="70" r="3" fill="#00d2ff" opacity="0.4"/>
  <circle cx="320" cy="50" r="2" fill="#3a7bd5" opacity="0.3"/>
  <circle cx="60" cy="300" r="2" fill="#00d2ff" opacity="0.2"/>
  <circle cx="340" cy="330" r="2.5" fill="#3a7bd5" opacity="0.25"/>
  <circle cx="200" cy="70" r="1.5" fill="#fff" opacity="0.15"/>
</svg>
