<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#3a7bd5"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#f7c948"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="160" x2="1280" y2="160" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="640" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="640" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="640" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>

  <!-- Anvil -->
  <path d="M540 420 L540 360 L580 360 L580 300 L700 300 L700 360 L740 360 L740 420 Z"
        fill="url(#accent)" opacity="0.12"/>

  <!-- Hammer -->
  <rect x="625" y="200" width="30" height="140" rx="4" fill="url(#accent)" opacity="0.3"/>
  <rect x="600" y="180" width="80" height="40" rx="8" fill="url(#accent)"/>

  <!-- Code brackets -->
  <text x="460" y="310" font-family="monospace" font-size="90" fill="url(#accent)" opacity="0.5">&lt;</text>
  <text x="775" y="310" font-family="monospace" font-size="90" fill="url(#accent)" opacity="0.5">/&gt;</text>

  <!-- Flame -->
  <path d="M640 400 C640 400 615 370 615 345 C615 320 632 305 640 305 C648 305 665 320 665 345 C665 370 640 400 640 400Z"
        fill="url(#flame)" opacity="0.85"/>
  <path d="M640 385 C640 385 625 363 625 348 C625 335 635 325 640 325 C645 325 655 335 655 348 C655 363 640 385 640 385Z"
        fill="#fff" opacity="0.35"/>

  <!-- Title -->
  <text x="640" y="250" font-family="sans-serif" font-size="60" font-weight="bold"
        fill="#e8e8e8" text-anchor="middle" letter-spacing="8">CODECRAFT</text>
  <text x="640" y="310" font-family="sans-serif" font-size="28" font-weight="bold"
        fill="url(#accent)" text-anchor="middle" letter-spacing="10">CLI</text>

  <!-- Tagline -->
  <text x="640" y="460" font-family="sans-serif" font-size="22" fill="#aaa"
        text-anchor="middle" letter-spacing="4">YOUR CODE SKILL FORGE</text>

  <!-- Feature tags -->
  <rect x="400" y="500" rx="20" ry="20" width="130" height="36" fill="url(#accent)" opacity="0.2"/>
  <text x="465" y="524" font-family="sans-serif" font-size="14" fill="#00d2ff"
        text-anchor="middle">Code Scanner</text>

  <rect x="560" y="500" rx="20" ry="20" width="160" height="36" fill="url(#accent)" opacity="0.2"/>
  <text x="640" y="524" font-family="sans-serif" font-size="14" fill="#3a7bd5"
        text-anchor="middle">Learning Debt</text>

  <rect x="750" y="500" rx="20" ry="20" width="130" height="36" fill="url(#accent)" opacity="0.2"/>
  <text x="815" y="524" font-family="sans-serif" font-size="14" fill="#00d2ff"
        text-anchor="middle">Spaced Repetition</text>

  <!-- pip install -->
  <rect x="440" y="560" rx="8" ry="8" width="400" height="40" fill="#000" opacity="0.3"/>
  <text x="640" y="586" font-family="monospace" font-size="16" fill="#888" text-anchor="middle">
    pip install codecraft-cli
  </text>

  <!-- Decorative dots -->
  <circle cx="200" cy="100" r="4" fill="#00d2ff" opacity="0.3"/>
  <circle cx="1080" cy="80" r="3" fill="#3a7bd5" opacity="0.25"/>
  <circle cx="150" cy="500" r="3" fill="#00d2ff" opacity="0.15"/>
  <circle cx="1130" cy="520" r="4" fill="#3a7bd5" opacity="0.2"/>
  <circle cx="350" cy="120" r="2" fill="#fff" opacity="0.1"/>
  <circle cx="930" cy="100" r="2.5" fill="#fff" opacity="0.12"/>
</svg>
